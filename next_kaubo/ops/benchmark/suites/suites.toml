# Kaubo v2 基准测试

[suite]
timeout = 120

# ── fib ──
[fib]
description = "Fibonacci 40 — 整数运算 + while + 函数调用"
expected = "102334155"
iterations = 10
warmup = 2

[fib.kaubo]
file = "fib.kaubo"

[fib.python]
function = "fib_iter"
args = [40]

[fib.rust]
function = "fib"

# ── sieve ──
[sieve]
description = "Sieve n=100000 — 整数 + 取模 + while"
