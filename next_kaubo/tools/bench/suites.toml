# Kaubo Benchmark Suite — 声明式配置
# 每个 suite 定义一个 benchmark 场景，支持多语言实现

[fib]
description = "Fibonacci iterative — 整数运算 + while + 函数调用"
expected = "102334155"
iterations = 5
warmup = 1

[fib.kaubo]
file = "fib.kaubo"

[fib.python]
function = "fib_iter"
args = [40]

[fib.rust]
args = ["fib"]
loops = 100000


